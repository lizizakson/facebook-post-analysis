c\u05d4\u05d9\u05e4\u05e8\u05d3 \u05de\u05de\u05e0\u05d4. \u05d5\u05d0\u2026","#\u05d0\u05e0\u05e9\u05d9_\u05d4\u05d2\u05dd_\u05d5\u05d2\u05dd  \u05d4\u05d0\u05dc\u05d8\u05e8 \u05d0\u05d2\u05d5 \u05e9\u05dc\u05d9 \u05d4\u05d5\u05d0 \u05e9\u05d7\u05e7\u05e0\u05d9\u05ea.  \u05d4\u05d9\u05d9\u05ea\u05d9 \u05d1\u05de\u05d2\u05de\u05ea \u05ea\u05d9\u05d0\u05d8\u05e8\u05d5\u05df \u05d1\u05ea\u05d9\u05db\u05d5\u05df, \u05d9\u05d7\u05d3 \u05e2\u05dd \u05d1\u05d9\u05d5\u2026","#\u05d0\u05e0\u05e9\u05d9_\u05d4\u05d2\u05dd_\u05d5\u05d2\u05dd.  \u05db\u05e9\u05e9\u05d5\u05d0\u05dc\u05d9\u05dd \u05d0\u05d5\u05ea\u05d9 \u05de\u05d9 \u05d0\u05e0\u05d9, \u05d0\u05e0\u05d9 \u05ea\u05de\u05d9\u05d3 \u05e0\u05e2\u05e6\u05e8\u05ea \u05dc\u05e9\u05e0\u05d9\u05d9\u05d4.  \u05db\u05d9 \u05d1\u05ea\u05d5\u05da \u05d4\u05e8\u05d0\u05e9 \u05e9\u05dc\u05d9 \u05d0\u2026","\u05d0\u05d9\u05d6\u05d4 \u05e2\u05e8\u05d1 \u05d6\u05d4 \u05d4\u05d9\u05d4!  \u05d3\u05d9\u05d1\u05e8\u05e0\u05d5 \u05e2\u05dc \u05e1\u05e4\u05e8\u05d5\u05ea - \u05e2\u05dc #\u05d1\u05d9\u05df_\u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea \u05e9\u05dc\u05d9 \u05d5\u05e2\u05dc \u05f4\u05d6\u05d0\u05ea \u05d0\u05e0\u05d9, \u05d0\u05d9\u05d5\u05d5\u05d4\u05f4 \u05d5\u2026","\u05d0\u05d9\u05d6\u05d4 \u05db\u05d9\u05e3 \u05d6\u05d4 \u05d7\u05d1\u05e8\u05d5\u05ea.  \u05db\u05d0\u05dc\u05d4 \u05e9\u05d0\u05ea \u05d9\u05db\u05d5\u05dc\u05d4 \u05dc\u05e9\u05d1\u05ea \u05d0\u05d9\u05ea\u05df \u05d1\u05d1\u05e8 \u05d5\u05dc\u05e8\u05d2\u05e2 \u05db\u05dc \u05d4\u05e2\u05d5\u05dc\u05dd \u05e0\u05e2\u05dc\u05dd. \u05e8\u05e7 \u05d0\u05ea\u05df \u05e7\u05d9\u05d9\u2026","\u05db\u05e9\u05d0\u05d7 \u05e9\u05dc\u05da \u05e0\u05d5\u05dc\u05d3, \u05d0\u05e0\u05d9 \u05e4\u05d7\u05d3\u05ea\u05d9.   \u05e4\u05d7\u05d3\u05ea\u05d9 \u05de\u05de\u05d4 \u05e9\u05d6\u05d4 \u05d9\u05e2\u05e9\u05d4 \u05dc\u05e7\u05e9\u05e8 \u05e9\u05dc\u05e0\u05d5.  \u05e0\u05e9\u05d0\u05d1\u05ea\u05d9 \u05dc\u05d8\u05d9\u05e4\u05d5\u05dc \u05d1\u05d5. \u05e8\u 05d4\u05d6\u05d4 \u05e9\u05dc \u05d4\u05d7\u05d5\u05d5\u05d9\u05d5\u05ea \u05d5\u05d4\u05ea\u05d7\u05d5\u05e9\u05d5\u05ea - \u05dc\u05d2\u05d3\u05d5\u05dc \u2026","\u05d1\u05d2\u05d9\u05dc 15 \u05dc\u05de\u05d3\u05ea\u05d9 \u05dc\u05d4\u05e1\u05ea\u05db\u05dc \u05e2\u05dc \u05e2\u05e6\u05de\u05d9 \u05d3\u05e8\u05da \u05e2\u05d9\u05e0\u05d9\u05d9\u05dd \u05e9\u05dc \u05d0\u05d7\u05e8\u05d9\u05dd.  \u05e6\u05e4\u05d9\u05ea\u05d9 \u05dc\u05d0\u05d7\u05e8\u05d5\u05e0\u05d4 \u05d1\u05d3\u05d5\u05e7\u05d5 \u05e2\u05dc Americ\u2026","\u05dc\u05de\u05d4 \u05d1\u05db\u05dc\u05dc \u05dc\u05db\u05ea\u05d5\u05d1?  \u05d0\u05e0\u05d9 \u05d4\u05e8\u05d1\u05d4 \u05e4\u05e2\u05de\u05d9\u05dd \u05e9\u05d5\u05d0\u05dc\u05ea \u05d0\u05ea \u05e2\u05e6\u05de\u05d9.  \u05d5\u05d1\u05d8\u05d7, \u05dc\u05de\u05d4 \u05d1\u05db\u05dc\u05dc \u05dc\u05e4\u05e8\u05e1\u05dd \u05d0\u05ea \u05de\u05d4 \u05e9\u05d0\u05e0\u05d9 \u2026","\u05d1\u05e1\u05d5\u05e3 \u05de\u05e1\u05e4\u05d9\u05e7\u05d4 \u05d4\u05d5\u05d3\u05e2\u05d4 \u05d0\u05d7\u05ea \u05de\u05d0\u05d9\u05e9\u05d4 \u05d0\u05d7\u05ea, \u05db\u05d3\u05d9 \u05dc\u05d4\u05d6\u05db\u05d9\u05e8 \u05dc\u05d9, \u05e9\u05dc\u05de\u05e8\u05d5\u05ea \u05db\u05dc \u05d4\u05db\u05d0\u05d5\u05e1 \u05e9\u05e0\u05db\u05e0\u05e1\u05d9\u05dd \u05d0\u05dc\u05d9\u05d5 \u05d0\u05d7\u05e8\u2026","\u05d4\u05de\u05e4\u05d2\u05e9\u05d9\u05dd \u05e2\u05dd \u05d4\u05e4\u05e0\u05d9\u05de\u05d9\u05e1\u05d8\u05d9\u05dd \u05ea\u05de\u05d9\u05d3 \u05de\u05d6\u05db\u05d9\u05e8\u05d9\u05dd \u05dc\u05d9 \u05d1\u05d9\u05ea.  \u05d0\u05d5\u05dc\u05d9 \u05d0\u05d7\u05d3 \u05d4\u05d7\u05dc\u05d5\u05de\u05d5\u05ea \u05d4\u05db\u05d9 \u05d2\u05d3\u05d5\u05dc\u05d9\u05dd \u05e9\u05dc\u05d9 \u05d4\u05d5\u05d0 \u2026","\u05d9\u05e9 \u05de\u05e9\u05d4\u05d5 \u05d1\u05d0\u05e0\u05d5\u05e9\u05d9\u05d5\u05ea \u05e9\u05e7\u05e9\u05d4 \u05dc\u05d4\u05e2\u05d1\u05d9\u05e8 \u05d3\u05e8\u05da \u05de\u05e1\u05da.  \u05d1\u05d6\u05de\u05df \u05d4\u05e7\u05d5\u05e8\u05d5\u05e0\u05d4 \u05e4\u05d2\u05e9\u05ea\u05d9 \u05d0\u05e0\u05e9\u05d9\u05dd \u05d1\u05e2\u05d9\u05e7\u05e8 \u05d5\u05d9\u05e8\u05d8\u05d5\u05d0\u05dc\u05d9\u05ea.\u2026","\u05db\u05e9\u05d0\u05ea \u05dc\u05d1\u05d3 \u05de\u05d5\u05dc \u05e2\u05e6\u05de\u05da \u05d5\u05e2\u05d5\u05d3 \u05e0\u05de\u05e6\u05d0\u05ea \u05d1\u05e8\u05e9\u05ea\u05d5\u05ea \u05d4\u05d7\u05d1\u05e8\u05ea\u05d9\u05d5\u05ea,  \u05d9\u05e9 \u05e9\u05d3\u05d9\u05dd \u05e9\u05de\u05d8\u05e4\u05e1\u05d9\u05dd \u05e2\u05dc\u05d9\u05da.   \u05d4\u05dd \u05de\u05e1\u05e4\u05e8\u05d9\u05dd\u2026","\u05db\u05e9\u05e0\u05d9\u05d2\u05e9\u05d9\u05dd \u05dc\u05e4\u05d2\u05d5\u05e9 \u05e7\u05d5\u05e8\u05d0\u05d9\u05dd \u05e4\u05d5\u05d8\u05e0\u05e6\u05d9\u05d0\u05dc\u05d9\u05d9\u05dd \u05d5\u05dc\u05d3\u05d1\u05e8 \u05e2\u05dc \u05d4\u05e1\u05e4\u05e8 \u05d6\u05d4 \u05ea\u05de\u05d9\u05d3 \u05e9\u05d9\u05dc\u05d5\u05d1 \u05e9\u05dc \u05e4\u05d7\u05d3 \u05d5\u05d4\u05ea\u05e8\u05d2\u05e9\u05d5\u05ea. \u05d4\u2026","\u05e7\u05e6\u05ea \u05de\u05d0\u05ea\u05de\u05d5\u05dc. \u05d4\u05e1\u05d9\u05e4\u05d5\u05e8 \u05d4\u05de\u05dc\u05d0 \u05de\u05d7\u05e8\u2026   #\u05d1\u05d9\u05df_\u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea #\u05e1\u05e4\u05e8\u05d5\u05ea\u05e2\u05d1\u05e8\u05d9\u05ea #\u05e1\u05e4\u05e8\u05d7\u05d3\u05e9 #\u05e1\u05e4\u05e8\u05d9\u05dd\u05e1\u05e4\u05e8\u05d9\u05dd\u05e1\u05e4\u05e8\u2026","\u05d0\u05d6\u05d4\u05e8\u05ea \u05d8\u05e8\u05d9\u05d2\u05e8: \u05d4\u05e4\u05d5\u05e1\u05d8 \u05d4\u05d1\u05d0 \u05e2\u05dc\u05d5\u05dc \u05dc\u05d2\u05e8\u05d5\u05dd \u05dc\u05db\u05dd \u05dc\u05d4\u05e8\u05d2\u05d9\u05e9 \u05d6\u05e7\u05e0\u05d9\u05dd...  \u05d0\u05e0\u05d9 \u05de\u05de\u05e9 \u05d6\u05d5\u05db\u05e8\u05ea \u05d0\u05ea \u05d4\u05e4\u05e2\u05dd \u05d4\u05e8\u05d0\u2026","\u05d8\u05d5\u05d1, \u05d6\u05d0\u05ea \u05d1\u05d4\u05d7\u05dc\u05d8 \u05d4\u05d9\u05d9\u05ea\u05d4 \u05e9\u05e0\u05d4 \u05e9\u05d5\u05e0\u05d4 \u05e2\u05d1\u05d5\u05e8\u05d9.  \u05e9\u05e0\u05d4 \u05e9\u05dc \u05d4\u05e8\u05d1\u05d4 \u05e9\u05d9\u05e0\u05d5\u05d9\u05d9\u05dd:  \u05e7\u05d9\u05e6\u05d5\u05e6\u05d9\u05dd \u05d1\u05e2\u05d1\u05d5\u05d3\u05d4 \u05d5\u05d7\u05d9\u05e4\u05d5\u2026","\u05d6\u05d4 \u05ea\u05de\u05d9\u05d3 \u05de\u05de\u05dc\u05d0 \u05dc\u05e4\u05d2\u05d5\u05e9 \u05d0\u05e0\u05e9\u05d9\u05dd \u05e9\u05d0\u05d5\u05d4\u05d1\u05d9\u05dd \u05e1\u05e4\u05e8\u05d9\u05dd.   \u05d0\u05d1\u05dc \u05d6\u05d4 \u05dc\u05d0 \u05e7\u05dc \u05dc\u05e2\u05de\u05d5\u05d3 \u05d1\u05d7\u05e0\u05d5\u05ea, \u05dc\u05d4\u05d1\u05d9\u05d8 \u05d1\u05d0\u05e0\u05e9\u05d9\u05dd\u2026","\u05e7\u05e6\u05ea \u05e7\u05e9\u05d4 \u05dc\u05d9 \u05dc\u05d4\u05d0\u05de\u05d9\u05df, \u05d0\u05d1\u05dc \u05d4\u05e0\u05d4 \u05d6\u05d4 \u05e7\u05e8\u05d4...  \u05d4\u05ea\u05e7\u05d1\u05dc\u05ea\u05d9 \u05dc\u05e8\u05d6\u05d9\u05d3\u05e0\u05e1\u05d9 \u05d1\u05de\u05e9\u05db\u05e0\u05d5\u05ea \u05e9\u05d0\u05e0\u05e0\u05d9\u05dd!  \u05d0\u05e0\u05d9 \u05db\u05dc\u05be\u05db\u2026","\u05dc\u05e4\u05e2\u05de\u05d9\u05dd \u05d0\u05e0\u05d9 \u05de\u05ea\u05d2\u05e2\u05d2\u05e2\u05ea \u05dc\u05d4\u05d9\u05d5\u05ea \u05d1\u05d4\u05d9\u05e8\u05d9\u05d5\u05df.  \u05dc\u05e4\u05e0\u05d9 \u05d1\u05d3\u05d9\u05d5\u05e7 \u05e9\u05e0\u05d4 \u05d4\u05d9\u05d9\u05ea\u05d9 \u05d1\u05d4\u05d9\u05e8\u05d9\u05d5\u05df \u05de\u05ea\u05e7\u05d3\u05dd, \u05e9\u05d1\u05d5\u05e2 39. \u2026","#\u05d0\u05e0\u05e9\u05d9_\u05d4\u05d2\u05dd_\u05d5\u05d2\u05dd  \u05d0\u05e0\u05d9 \u05dc\u05d9\u05d6 \u05d0\u05d9\u05d6\u05e7\u05e1\u05d5\u05df \u05de\u05e9\u05dc \u05d5\u05d0\u05e0\u05d9 \u05dc\u05d0 \u05e8\u05d5\u05e1\u05d9\u05d9\u05d4 \u05d5\u05dc\u05d0 \u05d9\u05e9\u05e8\u05d0\u05dc\u05d9\u05ea. \u05d0\u05e0\u05d9 \u05ea\u05d5\u05e9\u05d1\u05ea \u05db\u05d3\u05d5\u05e8-\u05d4\u05d0\u2026","\u05d1\u05e1\u05d5\u05e3 \u05d4\u05e9\u05d1\u05d5\u05e2 \u05d4\u05d0\u05d7\u05e8\u05d5\u05df \u05e2\u05e9\u05d9\u05ea\u05d9 \u05ea\u05d0\u05d5\u05e0\u05d4.  \u05ea\u05de\u05d9\u05d3 \u05e4\u05d7\u05d3\u05ea\u05d9 \u05de\u05d6\u05d4. \u05dc\u05d4\u05d9\u05db\u05e0\u05e1 \u05d7\u05d6\u05d9\u05ea\u05d9\u05ea \u05d1\u05d0\u05d5\u05d8\u05d5 \u05d0\u05d7\u05e8. \u05dc\u05d0\u05d1\u05d3 \u05e9\u05dc\u2026","\u05d4\u05e8\u05d1\u05d4 \u05e9\u05d5\u05d0\u05dc\u05d9\u05dd \u05d0\u05d5\u05ea\u05d9 - \u05d0\u05d6 \u05d6\u05d4\u05d5? \u05e2\u05db\u05e9\u05d9\u05d5 \u05db\u05e9\u05d4\u05e1\u05e4\u05e8 \u05d9\u05e6\u05d0, \u05d4\u05e2\u05d1\u05d5\u05d3\u05d4 \u05e2\u05dc\u05d9\u05d5 \u05e0\u05d2\u05de\u05e8\u05d4?  \u05d0\u05d6 \u05dc\u05d0 \u05e8\u05e7 \u05e9\u05d4\u05d9\u05d0 \u05dc\u2026","\ud83d\udcd6\u2708\ufe0f \u05d1\u05e9\u05d1\u05d5\u05e2 \u05d4\u05d0\u05d7\u05e8\u05d5\u05df \u05d2\u05d9\u05dc\u05d9\u05ea\u05d9 \u05e9\u05d4\u05e1\u05e4\u05e8 \u05e9\u05dc\u05d9 \u05de\u05d8\u05d9\u05d9\u05dc \u05d4\u05e8\u05d1\u05d4. \u05d1\u05e2\u05d5\u05dc\u05dd. \u05d1\u05de\u05d5\u05d7\u05d5\u05ea\u05d9\u05d4\u05dd \u05e9\u05dc \u05d0\u05d7\u05e8\u05d9\u05dd. \u05d4\u05d0\u05de\u05ea? \u05d4\u2026","\u05d6\u05d0\u05ea \u05d4\u05d9\u05d9\u05ea\u05d4 \u05e9\u05e0\u05d4 \u05de\u05d9\u05d5\u05d7\u05d3\u05ea \u05e2\u05d1\u05d5\u05e8\u05d9. \u05de\u05dc\u05d0\u05d4 \u05d1\u05d0\u05d4\u05d1\u05d4 \u05d5\u05d2\u05dd \u05d1\u05db\u05d0\u05d1.  \u05e9\u05e0\u05d4 \u05e9\u05d1\u05d4 \u05d9\u05dc\u05d3\u05ea\u05d9 \u05e4\u05e2\u05de\u05d9\u05d9\u05dd.  \u05d0\u05ea \u05d1\u05e0\u05d9 \u2026","\u05de\u05d4 \u05d6\u05d4 \u05d1\u05db\u05dc\u05dc \u05e9\u05dd \u05de\u05e9\u05e4\u05d7\u05d4?  \u05d4\u05d9\u05d7\u05e1\u05d9\u05dd \u05e9\u05dc\u05d9 \u05e2\u05dd \u05e9\u05de\u05d5\u05ea \u05ea\u05de\u05d9\u05d3 \u05d4\u05d9\u05d5 \u05de\u05d5\u05e8\u05db\u05d1\u05d9\u05dd.   \u05d9\u05e9 \u05dc\u05d9 \u05d4\u05e8\u05d1\u05d4 \u05e9\u05de\u05d5\u05ea. \u05d1\u05d4\u2026","\u2728 \u05d6\u05d4 \u05e7\u05d5\u05e8\u05d4 \u2728 \u05d4\u05e1\u05e4\u05e8 \u05e9\u05dc\u05d9, \u05f4\u05d1\u05d9\u05df \u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea\u05f4, \u05d9\u05e6\u05d0 \u05dc\u05d0\u05d5\u05d5\u05d9\u05e8 \u05d4\u05e2\u05d5\u05dc\u05dd! \ud83e\udd42 e0\u05d5 \u05d1\u05d1\u05ea\u05d9\u05dd,   \u05de\u05d3\u05d1\u05d9\u05e7\u05d4 \u05dc\u05de\u05e1\u05db\u05d9\u05dd \u05d5\u05de\u05db\u05e0\u05d9\u05e1\u05d4 \u05dc\u05d3\u05d0\u05d2\u05d4 \u05e7\u05d9\u05d5\u2026","\u05f4\u05e7\u05d5\u05d3\u05dd \u05db\u05dc \u05d0\u05e0\u05d9 \u05e8\u05d5\u05e1\u05d9\u05d9\u05d4.  \u05dc\u05d0 \u05d0\u05de\u05e8\u05ea\u05d9 \u05dc\u05e2\u05e6\u05de\u05d9 \u05e9\u05d0\u05e0\u05d9 \u05d8\u05d5\u05d1\u05d4 \u05d1\u05db\u05ea\u05d9\u05d1\u05d4.\u05f4  \u05d3\u05d9\u05d1\u05e8\u05e0\u05d5 \u05e2\u05dc \u05dc\u05d4\u05d9\u05d5\u05ea \u05e8\u05d5\u05e1\u05d9\u05d5\u05ea,\u2026","\u05d0\u05de\u05e0\u05dd \u05d0\u05e0\u05d9 \u05d1\u05e8\u05d6\u05d9\u05d3\u05e0\u05e1\u05d9, \u05de\u05e0\u05e1\u05d4 \u05dc\u05db\u05ea\u05d5\u05d1 \u05d0\u05ea \u05d4\u05d0\u05d7 \u05d4\u05e7\u05d8\u05df, \u05d0\u05d1\u05dc \u05d4\u05d1\u05db\u05d5\u05e8 \u05e2\u05d3\u05d9\u05d9\u05df \u05de\u05e1\u05ea\u05d5\u05d1\u05d1 \u05d1\u05e8\u05d0\u05e9.  \u05ea\u05d5\u05d3\u05d4 \u05d2\u05d3\u2026","\u05dc\u05e4\u05e0\u05d9 \u05db\u05e9\u05dc\u05d5\u05e9\u05d4 \u05d7\u05d5\u05d3\u05e9\u05d9\u05dd, \u05d4\u05e9\u05ea\u05ea\u05e4\u05ea\u05d9 \u05d9\u05d7\u05d3 \u05e2\u05dd Galit Dahan Carlibach \u05d1\u05e4\u05d0\u05e0\u05dc \u05e2\u05dc \u05e9\u05d5\u05dc\u05d9\u05d9\u05dd, \u05d5\u05d4\u05d0\u05d5\u05e4\u05df\u2026","\u05d0\u05e0\u05d9 \u05d0\u05d5\u05d4\u05d1\u05ea \u05d0\u05ea \u05d4\u05d8\u05e8\u05e0\u05d3 \u05d4\u05d6\u05d4 \u05d0\u05d6 \u05d1\u05d7\u05e8\u05ea\u05d9 \u05d1\u05d0\u05d5\u05e4\u05df \u05de\u05d0\u05d5\u05d3 \u05de\u05d5\u05d3\u05e2 (\u05db\u05de\u05d5\u05d1\u05df) \u05dc\u05d9\u05e4\u05d5\u05dc \u05d0\u05dc\u05d9\u05d5.  2016 \u05d4\u05d9\u05d9\u05ea\u05d4 \u2026","#\u05e1\u05e4\u05e8\u05d9\u05dd_\u05e9\u05d4\u05dd_\u05d4\u05e9\u05e8\u05d0\u05d4  \u05f4\u05d3\u05e8\u05d5\u05e8 \u05d7\u05d9\u05d9\u05d1 \u05dc\u05de\u05d5\u05ea\u05f4 \u002f \u05e8\u05d6 \u05e7\u05dc\u05de\u05e0\u05d5\u05d1\u05d9\u05e5\u05f3  \u05db\u05e9\u05e7\u05e8\u05d0\u05ea\u05d9, \u05dc\u05e8\u05d2\u05e2 \u05d4\u05e8\u05d2\u05e9\u05ea\u05d9 \u05e9\u05d4\u05e0\u05d4 \u05d2\u05dd \u2026","\u05e8\u05d9\u05e7\u05d9 \u05d1\u05e8\u05d5\u05da \u05db\u05ea\u05d1\u05d4 \u05e2\u05dc #\u05d1\u05d9\u05df_\u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea: \u05f4\u05d4\u05db\u05de\u05d9\u05d4\u05d4 \u05dc\u05e9\u05d9\u05d9\u05db\u05d5\u05ea \u05e9\u05db\u05dc \u05d0\u05d7\u05d3 \u05d1\u05db\u05dc \u05d2\u05d9\u05dc \u05de\u05d1\u05e7\u05e9 \u05dc\u05e2\u05e6\u05de\u05d5.\u05f4  \u2026","#\u05e1\u05e4\u05e8\u05d9\u05dd_\u05e9\u05d4\u05dd_\u05d4\u05e9\u05e8\u05d0\u05d4  \u05f4\u05d4\u05d7\u05d5\u05e7\u05d9\u05dd \u05e9\u05dc \u05d4\u05d1\u05e0\u05d5\u05ea\u05f4 \u002f \u05de\u05d9\u05d4 \u05d9\u05e1\u05e2\u05d5\u05e8  \u05d1\u05e1\u05d5\u05e4\u05f4\u05e9 \u05d4\u05d0\u05d7\u05e8\u05d5\u05df \u05e0\u05e1\u05e2\u05e0\u05d5 \u05dc\u05de\u05d3\u05d1\u05e8 \u05d5\u05d7\u05e9\u05d1\u05ea\u2026","#\u05e1\u05e4\u05e8\u05d9\u05dd_\u05e9\u05d4\u05dd_\u05d4\u05e9\u05e8\u05d0\u05d4  \"\u05e4\u05ea\u05d0\u05d5\u05dd \u05d1\u05d5\u05e7\u05e8\" \u002f \u05e0\u05e2\u05de\u05d4 \u05d3\u05e2\u05d9  \u05de\u05d4 \u05e9\u05d2\u05e8\u05dd \u05dc\u05d9 \u05dc\u05d4\u05ea\u05d0\u05d4\u05d1 \u05d1\u05e1\u05e4\u05e8 \u05d4\u05d6\u05d4 \u05d6\u05d4 \u05d4\u05e7\u05e6\u05d1 \u05e9\u05dc\u2026","#\u05e9\u05d9\u05d7\u05d4_\u05d1\u05d9\u05df_\u05e1\u05e4\u05e8\u05d9\u05dd  \u05d0\u05d9\u05d6\u05d4 \u05db\u05d9\u05e3 \u05dc\u05e4\u05d2\u05d5\u05e9 \u05e7\u05d5\u05dc\u05d2\u05d4!  \u05e9\u05e0\u05d9 \u05d4\u05e1\u05e4\u05e8\u05d9\u05dd \u05e9\u05dc\u05e0\u05d5 \u05de\u05ea\u05e2\u05e1\u05e7\u05d9\u05dd \u05d1\u05d0\u05d5\u05d1\u05e1\u05e1\u05d9\u05d4 \u05d4\u05d0\u05e0\u05d5\u05e9\u05d9\u05ea\u2026","\u05d2\u05d9\u05dc\u05d9\u05ea\u05d9 \u05e9\u05db\u05e9\u05d0\u05e0\u05d9 \u05d2\u05d5\u05dc\u05e9\u05ea \u05e7\u05d9\u05d9\u05d8, \u05d0\u05e0\u05d9 \u05d1\u05e2\u05e6\u05dd \u05de\u05ea\u05d0\u05de\u05e0\u05ea \u05e2\u05dc \u05e9\u05e7\u05d8. \u05e2\u05dc \u05e8\u05d9\u05db\u05d5\u
