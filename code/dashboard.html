5\u05d1\u05e5 \u05e8\u05d9\u05e7 \u05d0\u05d9 \u05e9\u05dd \u05d1\u05e7\u05d5\u05e8\u05d5\u05e0\u05d4.  \u05e2\u05d5\u05d3 \u05dc\u05d0 \u05d9\u05d3\u05e2\u05ea\u05d9 \u05de\u05d0\u05d9\u05e4\u05d4 \u05d1\u05db\u05dc\u2026","\u05e4\u05e2\u05dd \u05e4\u05d9\u05e0\u05d8\u05d6\u05ea\u05d9 \u05dc\u05db\u05ea\u05d5\u05d1 \u05d1\u05e9\u05dd \u05e2\u05d8...  \u05dc\u05ea\u05ea \u05dc\u05d9\u05e6\u05d9\u05e8\u05d4 \u05d7\u05d9\u05d9\u05dd \u05de\u05e9\u05dc\u05d4, \u05de\u05e0\u05d5\u05ea\u05e7\u05d9\u05dd \u05de\u05de\u05e0\u05d9.  \u05d0\u05d1\u05dc \u05d1\u05de\u05e6\u05d9\u05d0\u05d5\u05ea \u05e9\u05dc\u2026","#\u05d6\u05d4\u05d5_\u05d6\u05d4_\u05e7\u05d5\u05e8\u05d4!  \u05e1\u05e4\u05d8\u05de\u05d1\u05e8 \u05de\u05d1\u05d9\u05d0 \u05d0\u05d9\u05ea\u05d5 \u05d4\u05ea\u05d7\u05dc\u05d5\u05ea \u05d7\u05d3\u05e9\u05d5\u05ea.  \u05d4\u05d9\u05dc\u05d3\u05d9\u05dd \u05d7\u05d5\u05d6\u05e8\u05d9\u05dd \u05dc\u05de\u05e1\u05d2\u05e8\u05d5\u05ea (\u05e1\u05d5\u05e4\u05e1\u05d5\u05e3:)),\u2026","#\u05d7\u05e9\u05d9\u05e4\u05ea_\u05db\u05e8\u05d9\u05db\u05d4  \u05d0\u05d6 \u05d4\u05e0\u05d4 \u05d6\u05d4 \u05e7\u05d5\u05e8\u05d4. \u05d4\u05e8\u05d2\u05e2 \u05e9\u05d7\u05d9\u05db\u05d9\u05ea\u05d9 \u05dc\u05d5 \u05d7\u05de\u05e9 \u05e9\u05e0\u05d9\u05dd.   \u05d9\u05e9 \u05db\u05e8\u05d9\u05db\u05d4.   \u05d9\u05e9 \u05e1\u05e4\u05e8.   \u2026","\u05e8\u05d2\u05e2\u05d9 \u05d4\u05d4\u05d9\u05e4\u05e8\u05d3\u05d5\u05ea \u05d4\u05e8\u05d0\u05e9\u05d5\u05e0\u05d9\u05dd \u05de\u05dc\u05d4\u05d9\u05d5\u05ea \u05d4\u05d0\u05de\u05d0 \u05e9\u05dc\u05da \u05d1\u05de\u05e9\u05e8\u05d4 \u05de\u05dc\u05d0\u05d4 \u05d4\u05dd \u05d4\u05db\u05d9 \u05e7\u05e9\u05d9\u05dd.   \u05d5\u05d0\u05d5\u05dc\u05d9 \u05d3\u05d5\u05d5\u05e7\u05d0 \u05d9\u05d5\u05ea\u2026","\u05ea\u05de\u05d9\u05d3 \u05db\u05e9\u05d0\u05e0\u05d9 \u05d0\u05d5\u05de\u05e8\u05ea \u05e9\u05d4\u05d9\u05d9\u05ea\u05d9 \u05d1\u05e4\u05e0\u05d9\u05de\u05d9\u05d9\u05d4, \u05d0\u05e0\u05d9 \u05e8\u05d5\u05d0\u05d4 \u05d0\u05d9\u05da \u u05e8\u05d5\u05e0\u05d5\u05ea \u05de\u05d9\u05dc\u05d9\u05dd \u05e9\u05e0\u05d2\u05e2\u05d5 \u05d1\u05d9 \u05d1\u05d3\u05d9\u05d5\u05e7 \u05d1\u05de\u05e7\u05d5\u05dd \u05e9\u05de\u05de\u05e0\u05d5 \u05d4\u05e1\u05e4\u05e8 \u05e0\u05db\u05ea\u05d1,  \u05d4\u05d7\u05d9\u05e4\u05d5\u05e9 \u05d0\u2026","\u05e8\u05d6\u05d9\u05d3\u05e0\u05e1\u05d9 \u05db\u05ea\u05d9\u05d1\u05d4 \u05d1\u05d9\u05e8\u05d5\u05e9\u05dc\u05d9\u05dd.  \u05d0\u05e0\u05e9\u05d9\u05dd \u05d8\u05d5\u05d1\u05d9\u05dd \u2714\ufe0f \u05e1\u05d5\u05e4\u05e8\u05d9\u05dd \u05de\u05e2\u05d5\u05e8\u05e8\u05d9 \u05d4\u05e9\u05e8\u05d0\u05d4 \u2714\ufe0f \u05e7\u05e4\u05d4 (\u05d4\u05e8\u05d1\u05d4) \u2714\ufe0f \u05e0\u05d5\u05e3\u2026","\u05dc\u05e4\u05e2\u05de\u05d9\u05dd \u05d4\u05e7\u05d5\u05e8\u05d0\u05d9\u05dd \u05de\u05e6\u05dc\u05d9\u05d7\u05d9\u05dd \u05dc\u05e1\u05db\u05dd \u05d0\u05ea \u05d4\u05e1\u05e4\u05e8 \u05e9\u05dc\u05da \u05d9\u05d5\u05ea\u05e8 \u05d8\u05d5\u05d1 \u05de\u05de\u05da. \u05ea\u05d5\u05d3\u05d4 \u05dc \u05d0\u05d3\u05d5\u05e8\u05dd \u05d2\u05d5\u05dc\u05e0\u05e8 \u05e2\u05dc \u05e7\u05e8\u05d9\u05d0\u2026","\u05d4\u05ea\u05e8\u05d2\u05e9\u05ea\u05d9 \u05dc\u05e7\u05d1\u05dc \u05e1\u05e7\u05d9\u05e8\u05d4 \u05db\u05d6\u05d0\u05ea \u05de\u05e2\u05de\u05d9\u05e7\u05d4 \u05de Danielle Eshel, \u05e9\u05de\u05d6\u05db\u05d9\u05e8\u05d4 \u05dc\u05d9 \u05d0\u05ea \u05d4\u05de\u05e7\u05d5\u05dd \u05e9\u05de\u05de\u05e0\u05d5 \u05e0\u05db\u05ea\u05d1 \u2026","\u05d4\u05d0\u05dd \u05d9\u05e9 \u05de\u05ea\u05db\u05d5\u05df \u05dc\u05d4\u05ea\u05d0\u05d4\u05d1\u05d5\u05ea? \u05e7\u05d8\u05e2 \u05e7\u05e6\u05e8 \u05de\u05ea\u05d5\u05da \u05f4\u05d1\u05d9\u05df \u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea\u05f4...  Orna landau - \u05d0\u05d5\u05e8\u05e0\u05d4 \u05dc\u05e0\u05d3\u05d0\u2026","\u05dc\u05d3\u05d1\u05e8 \u05d1\u05e7\u05e6\u05e8\u05d4 \u05d6\u05d4 \u05dc\u05d0 \u05d1\u05d3\u05d9\u05d5\u05e7 \u05d4\u05e6\u05d3 \u05d4\u05d7\u05d6\u05e7 \u05e9\u05dc\u05d9.  \u05d0\u05d1\u05dc \u05d1\u05d9\u05e7\u05e9\u05d5 \u05de\u05de\u05e0\u05d9 \u05dc\u05d1\u05d7\u05d5\u05e8 \u05e8\u05e7 \u05e9\u05dc\u05d5\u05e9\u05d4 \u05d3\u05d1\u05e8\u05d9\u05dd \u05e2\u05dc #\u05d1\u05d9\u2026","\u05d6\u05d4\u05d9\u05e8\u05d5\u05ea! \u05e6\u05d1\u05e2 \u05d0\u05d3\u05d5\u05dd.  \u05d4\u05e9\u05d1\u05d5\u05e2 \u05e0\u05e4\u05d2\u05e9\u05ea\u05d9 \u05e2\u05dd \u05d0\u05d7\u05d3 \u05de\u05d4\u05de\u05d3\u05e8\u05d9\u05db\u05d9\u05dd \u05e9\u05dc\u05d9 \u05de\u05d4\u05e4\u05e0\u05d9\u05de\u05d9\u05d9\u05d4.  \u05d5\u05d4\u05d5\u05d0 \u05d1\u05de\u05e7\u05e8\u05d4 \u05d0\u05d5 \u05e9\u2026","\u05d4\u05ea\u05e8\u05d2\u05e9\u05ea\u05d9 \u05dc\u05e8\u05d0\u05d5\u05ea \u05e2\u05d3 \u05db\u05de\u05d4 Elena Glozman \u05e0\u05d2\u05e2\u05d4 \u05d1\u05dc\u05d1 \u05e9\u05dc #\u05d1\u05d9\u05df_\u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea.  \u05f4\u05d4\u05d0\u05d8\u05d9\u05de\u05d5\u05ea \u05de\u05e6\u05d3 \u05e7\u05e8\u05d5\u2026","\u05dc\u05e4\u05e2\u05de\u05d9\u05dd \u05d0\u05e0\u05d9 \u05de\u05e7\u05d1\u05dc\u05ea \u05ea\u05d2\u05d5\u05d1\u05d5\u05ea \u05e2\u05dc \u05d4\u05e1\u05e4\u05e8 \u05e9\u05e4\u05d5\u05d2\u05e2\u05d5\u05ea \u05d1\u05d3\u05d9\u05d5\u05e7 \u05d1\u05de\u05e7\u05d5\u05dd \u05d4\u05db\u05d9 \u05d7\u05e9\u05d5\u05e3 \u05e9\u05de\u05de\u05e0\u05d5 \u05d4\u05d5\u05d0 \u05e0\u05db\u05ea\u05d1.  \u05e2\u05e0\u2026","\u05de\u05ea\u05e8\u05d2\u05e9\u05ea \u05dc\u05e7\u05e8\u05d0\u05ea \u05d4\u05d0\u05d9\u05e8\u05d5\u05e2 \u05d4\u05d6\u05d4 \u05d4\u05e2\u05e8\u05d1! \u2728 \u05e9\u05d5\u05dc\u05d9\u05d9\u05dd \u05d6\u05d4 \u05e0\u05d5\u05e9\u05d0 \u05e9\u05de\u05d0\u05d5\u05d3 \u05e7\u05e8\u05d5\u05d1 \u05dc\u05dc\u05d9\u05d1\u05d9.  \u05e8\u05d5\u05d1 \u05d7\u05d9\u05d9 \u05d4\u05e8\u05d2\u05e9\u05ea\u05d9\u2026","\u05db\u05de\u05d4 \u05de\u05e8\u05d2\u05e9 \u05dc\u05e7\u05d1\u05dc \u05e1\u05e7\u05d9\u05e8\u05d4 \u05db\u05d6\u05d0\u05ea \u05de\u05e2\u05de\u05d9\u05e7\u05d4 \u05e2\u05dc #\u05d1\u05d9\u05df_\u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea!  \u05ea\u05d5\u05d3\u05d4 \u05e2\u05e0\u05e7\u05d9\u05ea \u05dc Raz Calmanovici\u2026","\u05dc\u05db\u05d1\u05d5\u05d3 \u05d9\u05d5\u05dd \u05db\u05d9\u05e4\u05d5\u05e8 \u05d0\u05e0\u05d9 \u05e8\u05d5\u05e6\u05d4 \u05dc\u05d3\u05d1\u05e8 \u05d0\u05d9\u05ea\u05db\u05dd \u05e2\u05dc \u05e9\u05e7\u05e8\u05d9\u05dd \u05d5\u05d4\u05e1\u05ea\u05e8\u05d5\u05ea.  \u05d4\u05d9\u05d7\u05e1\u05d9\u05dd \u05e9\u05dc\u05d9 \u05e2\u05dd \u05e9\u05e7\u05e8 \u05ea\u05de\u05d9\u05d3 \u05d4\u05d9\u2026","\u05d9\u05e9 \u05e1\u05e7\u05d9\u05e8\u05d5\u05ea \u05e9\u05e2\u05d5\u05e9\u05d5\u05ea \u2018\u05e7\u05d5\u05d5\u05d0\u05e5\u2019 \u05db\u05d6\u05d4 \u05d1\u05dc\u05d1 - \u05d6\u05d5 \u05d0\u05d7\u05ea \u05de\u05d4\u05df.  \u05ea\u05d5\u05d3\u05d4 Hadar Azoulay Liberman \u05e2\u05dc \u05d4\u2026","~ \u05e2\u05dc \u05d9\u05e6\u05d9\u05e8\u05d4 \u05d5\u05e6\u05d5\u05e8\u05d4 ~  \u05d4\u05d0\u05dd \u05d4\u05d9\u05e6\u05d9\u05e8\u05d4 \u05e2\u05d3\u05d9\u05d9\u05df \u05e0\u05d7\u05e9\u05d1\u05ea \u05d9\u05e6\u05d9\u05e8\u05d4 \u05d0\u05dd \u05d4\u05d9\u05d0 \u05dc\u05d0 \u05e4\u05d5\u05d2\u05e9\u05ea \u05d0\u05ea \u05d4\u05e7\u05d5\u05e8\u05d0\u05d9\u05dd, \u05d4\u05e6\u05d5\u2026","\u05db\u05de\u05d4 \u05de\u05e8\u05d2\u05e9 \u05dc\u05e8\u05d0\u05d5\u05ea \u05d0\u05ea \u05d4\u05e1\u05e7\u05d9\u05e8\u05d4 \u05d4\u05e8\u05d0\u05e9\u05d5\u05e0\u05d4 \u05e9\u05dc #\u05d1\u05d9\u05df_\u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea!  \u05db\u05dc \u05e4\u05d2\u05d9\u05e9\u05d4 \u05e9\u05dc \u05d9\u05e6\u05d9\u05e8\u05d4 \u05e2\u05dd \u05e7\u05d5\u05e8\u05d0 \u05d7\u2026","\u05d0\u05d9\u05d6\u05d4 \u05db\u05d9\u05e3 \u05dc\u05d4\u05d5\u05e4\u05d9\u05e2 \u05d1\u05e4\u05d9\u05e0\u05d4 \u05e9\u05dc \u05e8\u05d6! \u05ea\u05d5\u05d3\u05d4 \u05e2\u05dc \u05d4\u05e9\u05d0\u05dc\u05d5\u05ea \u05d4\u05de\u05e2\u05d5\u05dc\u05d5\u05ea \ud83d\ude4f  \u05d1\u05d9\u05df \u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea \u05e2\u05d3\u05d9\u05d9\u05df \u05d1\u05de\u05d1\u05e6\u05e2\u2026",null,"\u05d9\u05e9 \u05dc\u05d9 \u05d5\u05d9\u05d3\u05d5\u05d9.  \u05d0\u05e0\u05d9 \u05de\u05de\u05e9 \u05d0\u05d5\u05d4\u05d1\u05ea \u05e8\u05d9\u05d7 \u05e9\u05dc \u05e1\u05e4\u05e8\u05d9\u05dd.  \u05d4\u05d3\u05d1\u05e8 \u05d4\u05e8\u05d0\u05e9\u05d5\u05df \u05e9\u05d0\u05e0\u05d9 \u05e2\u05d5\u05e9\u05d4 \u05db\u05e9\u05d0\u05e0\u05d9 \u05dc\u05d5\u05e7\u05d7\u05ea \u05e1\u05e4\u05e8\u2026","#\u05de\u05d0\u05d7\u05d5\u05e8\u05d9_\u05d4\u05de\u05e1\u05d3\u05e8\u05d5\u05e0\u05d5\u05ea  \u05e2\u05d1\u05e8, \u05d4\u05d5\u05d5\u05d4 \u05d5\u05de\u05d4 \u05e9\u05d1\u05d9\u05e0\u05d9\u05d4\u05dd.  \u05de\u05d4 \u05e9\u05d0\u05d9\u05e4\u05e9\u05e8 \u05dc\u05d9 \u05dc\u05d4\u05ea\u05d7\u05d9\u05dc \u05dc\u05db\u05ea\u05d5\u05d1 \u05d0\u05ea \u05d4\u05de\u05d9\u05dc\u05d9\u05dd \u05d4\u2026","\u05de\u05d4 \u05d6\u05d4 \u05d1\u05d9\u05ea \u05e2\u05d1\u05d5\u05e8\u05d9?  \u05d1\u05d7\u05e0\u05d5\u05db\u05d4 \u05d4\u05d0\u05d7\u05e8\u05d5\u05df, \u05db\u05e9\u05d4\u05d9\u05d9\u05ea\u05d9 \u05d1\u05e9\u05d1\u05d5\u05e2 40, \u05d4\u05dc\u05db\u05ea\u05d9 \u05dc\u05d4\u05d3\u05dc\u05e7\u05ea \u05e0\u05e8\u05d5\u05ea \u05d0\u05e6\u05dc \u05d4\u05e2\u05d5\u05e8\u05db\u05ea \u2026",null,"\u05de\u05d4 \u05d6\u05d4 \u05d0\u05d5\u05de\u05e8 \u05dc\u05d4\u05e0\u05d5\u05ea \u05de\u05d4\u05e8\u05d2\u05e2? \u05d4\u05e8\u05d1\u05d4 \u05e4\u05e2\u05de\u05d9\u05dd \u05d0\u05e0\u05d9 \u05e9\u05d5\u05de\u05e2\u05ea \u05d0\u05d5 \u05de\u05d6\u05db\u05d9\u05e8\u05d4 \u05dc\u05e2\u05e6\u05de\u05d9 \u05dc\u05d4\u05e0\u05d5\u05ea \u05de\u05d4\u05db\u05d0\u05df \u05d5\u05d4\u05e2\u05db\u05e9\u05d9\u05d5\u2026","\u05dc\u05de\u05d4 \u05e9\u05d9\u05e0\u05d5\u05d9\u05d9\u05dd \u05db\u05dc \u05db\u05da \u05de\u05e4\u05d7\u05d9\u05d3\u05d9\u05dd \u05d0\u05d5\u05ea\u05e0\u05d5? \u05d0\u05d5\u05dc\u05d9 \u05db\u05d9 \u05d4\u05dd \u05ea\u05de\u05d9\u05d3 \u05de\u05d1\u05e9\u05e8\u05d9\u05dd \u05d0\u05d9\u05ea\u05dd \u05d0\u05ea \u05d4\u05e1\u05d5\u05e3 \u05e9\u05dc \u05de\u05e9\u05d4\u05d5? \u05ea\u
